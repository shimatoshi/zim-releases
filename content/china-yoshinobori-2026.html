    <h1>2024-2026年 中国におけるヨシノボリ属の新種記載</h1>
    <p>2024年から2026年7月までに中国で記載されたヨシノボリ属（<em>Rhinogobius</em>）の新種は以下の通りです。</p>
    <ul>
        <li><strong><em>Rhinogobius jangshiensis</em></strong> (2024年12月)</li>
        <li><strong><em>Rhinogobius mengyangensis</em></strong> (2026年5月) - 四川省で発見。<em>ZooKeys</em> 1280: 333-347 に記載。</li>
    </ul>
